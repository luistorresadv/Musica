<div style="font-family: Arial, sans-serif; margin-top: 30px; padding: 10px;">
  
  <h2 style="border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-bottom: 20px;">Control de Álbumes</h2>


  <div style="background-color: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 25px;">
    <form (ngSubmit)="guardarAlbum()" style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
      
      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label style="font-size: 12px; font-weight: bold; color: #555;">Título</label>
        <input type="text" name="titulo" [(ngModel)]="nuevoAlbum.titulo" placeholder="Título del álbum" required style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; width: 180px;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label style="font-size: 12px; font-weight: bold; color: #555;">Género</label>
        <input type="text" name="genero" [(ngModel)]="nuevoAlbum.genero" placeholder="Género" required style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; width: 140px;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label style="font-size: 12px; font-weight: bold; color: #555;">Año</label>
        <input type="text" name="anio" [(ngModel)]="nuevoAlbum.anio" placeholder="Año" required style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; width: 90px;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label style="font-size: 12px; font-weight: bold; color: #555;">Discográfica</label>
        <input type="text" name="discografica" [(ngModel)]="nuevoAlbum.discografica" placeholder="Discográfica" required style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; width: 180px;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label style="font-size: 12px; font-weight: bold; color: #555;">Artista</label>
        <select name="artistaId" [(ngModel)]="nuevoAlbum.artistaId" required style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; height: 32px; background-color: white;">
          <option value="">-- Selecciona un Artista --</option>
          <option *ngFor="let art of artistas" [value]="art.id">
            {{ art.nombre }} {{ art.apellido }}
          </option>
        </select>
      </div>

      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button type="submit" [style.background-color]="editando ? '#28a745' : '#007bff'" style="color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">
          {{ editando ? 'Actualizar Álbum' : 'Guardar Álbum' }}
        </button>

        <button type="button" *ngIf="editando" (click)="limpiarFormulario()" style="background-color: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">
          Cancelar
        </button>
      </div>
    </form>
  </div>

  
  <table style="width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; border: 1px solid #ddd;">
    <thead>
      <tr style="background-color: #f2f2f2; border-bottom: 2px solid #ddd;">
        <th style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Título</th>
        <th style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Género</th>
        <th style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Año</th>
        <th style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Discográfica</th>
        <th style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Artista</th>
        <th style="padding: 10px; border: 1px solid #ddd; font-weight: bold; width: 150px;">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let alb of albumes" style="border-bottom: 1px solid #ddd;">
        <td style="padding: 10px; border: 1px solid #ddd;">{{ alb.titulo }}</td>
        <td style="padding: 10px; border: 1px solid #ddd;">{{ alb.genero }}</td>
        <td style="padding: 10px; border: 1px solid #ddd;">{{ alb['año_lanzamiento'] }}</td>
        <td style="padding: 10px; border: 1px solid #ddd;">{{ alb.discografica }}</td>
        <td style="padding: 10px; border: 1px solid #ddd;">
          {{ alb.artista ? alb.artista.nombre + ' ' + (alb.artista.apellido || '') : 'Sin artista' }}
        </td>
        <td style="padding: 10px; border: 1px solid #ddd;">
          <button (click)="seleccionarParaEditar(alb)" style="background-color: transparent; border: 1px solid #ccc; padding: 3px 8px; border-radius: 3px; cursor: pointer; margin-right: 5px;">Editar</button>
          <button (click)="eliminarAlbum(alb.id)" style="background-color: transparent; border: 1px solid #ccc; padding: 3px 8px; border-radius: 3px; cursor: pointer;">Eliminar</button>
        </td>
      </tr>
      <tr *ngIf="albumes.length === 0">
        <td colspan="6" style="padding: 15px; text-align: center; color: #777;">No hay álbumes registrados.</td>
      </tr>
    </tbody>
  </table>

</div>
